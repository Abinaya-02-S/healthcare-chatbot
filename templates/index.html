<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthCare ChatBot</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --teal: #0d9488;
            --teal-light: #ccfbf1;
            --teal-dark: #0f766e;
            --bg: #f0fdfa;
            --white: #ffffff;
            --gray: #64748b;
            --dark: #0f172a;
            --red: #ef4444;
            --yellow: #f59e0b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 30px 16px;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: var(--teal-dark);
            letter-spacing: -0.5px;
        }
        header p {
            color: var(--gray);
            font-size: 15px;
            margin-top: 6px;
        }

        /* Chat Window */
        .chat-window {
            width: 100%;
            max-width: 680px;
            background: var(--white);
            border-radius: 24px;
            box-shadow: 0 8px 40px rgba(13,148,136,0.10);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 500px;
        }
        .chat-header {
            background: linear-gradient(90deg, var(--teal-dark), var(--teal));
            padding: 18px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .bot-avatar {
            width: 42px; height: 42px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
        }
        .chat-header-text h3 { color: white; font-size: 16px; font-weight: 600; }
        .chat-header-text p { color: rgba(255,255,255,0.75); font-size: 12px; }
        .online-dot {
            width: 8px; height: 8px; background: #4ade80;
            border-radius: 50%; margin-left: auto;
            box-shadow: 0 0 0 2px rgba(74,222,128,0.3);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

        /* Messages */
        .messages {
            flex: 1;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            overflow-y: auto;
            max-height: 480px;
        }
        .msg {
            display: flex;
            gap: 10px;
            animation: fadeUp 0.3s ease;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg.bot { align-items: flex-start; }
        .msg.user { flex-direction: row-reverse; }
        .msg-avatar {
            width: 34px; height: 34px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; flex-shrink: 0;
        }
        .msg.bot .msg-avatar { background: var(--teal-light); }
        .msg.user .msg-avatar { background: #dbeafe; }
        .msg-bubble {
            max-width: 78%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.6;
        }
        .msg.bot .msg-bubble {
            background: var(--teal-light);
            color: var(--dark);
            border-top-left-radius: 4px;
        }
        .msg.user .msg-bubble {
            background: var(--teal);
            color: white;
            border-top-right-radius: 4px;
        }

        /* Options buttons */
        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
            padding: 0 24px 10px 68px;
        }
        .opt-btn {
            padding: 8px 16px;
            border: 2px solid var(--teal);
            background: white;
            color: var(--teal-dark);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
        }
        .opt-btn:hover { background: var(--teal); color: white; }

        /* Input area */
        .input-area {
            padding: 16px 20px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .input-area input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 30px;
            font-size: 14px;
            outline: none;
            font-family: 'DM Sans', sans-serif;
            transition: border 0.2s;
        }
        .input-area input:focus { border-color: var(--teal); }
        .send-btn {
            width: 44px; height: 44px;
            background: var(--teal);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .send-btn:hover { background: var(--teal-dark); }

        /* Result card */
        .result-card {
            background: linear-gradient(135deg, #0f766e, #0d9488);
            color: white;
            border-radius: 16px;
            padding: 20px;
            margin-top: 4px;
        }
        .result-card h3 { font-size: 18px; margin-bottom: 4px; }
        .result-card .conf { font-size: 12px; opacity: 0.8; margin-bottom: 14px; }
        .result-row { display: flex; gap: 8px; margin-bottom: 10px; font-size: 13px; align-items: flex-start; }
        .result-row span:first-child { font-size: 16px; flex-shrink: 0; }
        .prec-list { margin-top: 10px; }
        .prec-list h4 { font-size: 13px; opacity: 0.85; margin-bottom: 6px; }
        .prec-list ol { margin-left: 18px; font-size: 13px; line-height: 1.8; }

        /* Typing indicator */
        .typing { display: flex; gap: 5px; padding: 14px 18px; align-items: center; }
        .typing span {
            width: 8px; height: 8px;
            background: var(--teal);
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
    </style>
</head>
<body>
<header>
    <h1>🏥 HealthCare ChatBot</h1>
    <p>Answer a few questions to get your health assessment</p>
</header>

<div class="chat-window">
    <div class="chat-header">
        <div class="bot-avatar">🤖</div>
        <div class="chat-header-text">
            <h3>Health Assistant</h3>
            <p>Powered by AI · Not a substitute for medical advice</p>
        </div>
        <div class="online-dot"></div>
    </div>

    <div class="messages" id="messages"></div>
    <div class="options" id="options"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your answer here..." onkeydown="if(event.key==='Enter') sendMessage()" />
        <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
// Conversation state
const state = {
    step: 'name',
    name: '', age: '', gender: '',
    symptoms: [], extraSymptoms: [],
    followUpSymptoms: [], followUpIndex: 0,
    initialInput: ''
};

function addMsg(text, sender='bot', isHtml=false) {
    const messages = document.getElementById('messages');
    const msg = document.createElement('div');
    msg.className = `msg ${sender}`;
    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = sender === 'bot' ? '🤖' : '👤';
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    if (isHtml) bubble.innerHTML = text;
    else bubble.textContent = text;
    msg.appendChild(avatar);
    msg.appendChild(bubble);
    messages.appendChild(msg);
    messages.scrollTop = messages.scrollHeight;
    clearOptions();
}

function showTyping() {
    const messages = document.getElementById('messages');
    const msg = document.createElement('div');
    msg.className = 'msg bot';
    msg.id = 'typing-indicator';
    msg.innerHTML = `<div class="msg-avatar">🤖</div><div class="msg-bubble" style="padding:0"><div class="typing"><span></span><span></span><span></span></div></div>`;
    messages.appendChild(msg);
    messages.scrollTop = messages.scrollHeight;
}

function removeTyping() {
    const t = document.getElementById('typing-indicator');
    if (t) t.remove();
}

function showOptions(opts) {
    const container = document.getElementById('options');
    container.innerHTML = '';
    opts.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'opt-btn';
        btn.textContent = opt;
        btn.onclick = () => { addMsg(opt, 'user'); handleInput(opt); };
        container.appendChild(btn);
    });
}

function clearOptions() {
    document.getElementById('options').innerHTML = '';
}

function botSay(text, delay=600, opts=[]) {
    showTyping();
    setTimeout(() => {
        removeTyping();
        addMsg(text);
        if (opts.length) showOptions(opts);
    }, delay);
}

function sendMessage() {
    const input = document.getElementById('userInput');
    const val = input.value.trim();
    if (!val) return;
    addMsg(val, 'user');
    input.value = '';
    handleInput(val);
}

function handleInput(val) {
    clearOptions();
    const v = val.trim();

    if (state.step === 'name') {
        state.name = v;
        state.step = 'age';
        botSay(`Nice to meet you, ${state.name}! 😊 How old are you?`);

    } else if (state.step === 'age') {
        state.age = v;
        state.step = 'gender';
        botSay('What is your gender?', 600, ['Male', 'Female', 'Other']);

    } else if (state.step === 'gender') {
        state.gender = v;
        state.step = 'symptoms';
        botSay('Please describe your symptoms. For example: "I have fever and headache"');

    } else if (state.step === 'symptoms') {
        state.initialInput = v;
        state.step = 'days';
        botSay('Got it! For how many days have you had these symptoms?', 600, ['1-2 days', '3-5 days', '1 week', 'More than 1 week']);

    } else if (state.step === 'days') {
        state.days = v;
        state.step = 'severity';
        botSay('On a scale of 1-10, how severe do you feel?', 600, ['1-3 (Mild)', '4-6 (Moderate)', '7-10 (Severe)']);

    } else if (state.step === 'severity') {
        state.severity = v;
        state.step = 'analyzing';
        botSay('Let me analyze your symptoms...', 400);
        setTimeout(() => analyzeSymptoms(), 1200);

    } else if (state.step === 'followup') {
        const answer = v.toLowerCase();
        const sym = state.followUpSymptoms[state.followUpIndex];
        if (answer === 'yes' || answer.includes('yes')) {
            state.extraSymptoms.push(sym);
        }
        state.followUpIndex++;
        askNextFollowUp();

    } else if (state.step === 'done') {
        botSay('Your session is complete. Refresh the page to start again! 😊');
    }
}

async function analyzeSymptoms() {
    try {
        showTyping();
        const res = await fetch('/get_followup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ symptoms: state.initialInput })
        });
        const data = await res.json();
        removeTyping();

        if (data.error) {
            addMsg('❌ ' + data.error);
            return;
        }

        state.symptoms = data.detected_symptoms;
        state.followUpSymptoms = data.followup_symptoms;
        state.followUpIndex = 0;

        addMsg(`✅ I detected: ${data.detected_symptoms.join(', ')}`);
        setTimeout(() => {
            botSay(`Now let me ask you a few more questions about your condition...`);
            setTimeout(() => askNextFollowUp(), 1000);
        }, 500);

    } catch(e) {
        removeTyping();
        addMsg('❌ Something went wrong. Please try again.');
    }
}

function askNextFollowUp() {
    if (state.followUpIndex >= state.followUpSymptoms.length || state.followUpIndex >= 6) {
        state.step = 'getting_result';
        botSay('Almost done! Getting your results...', 400);
        setTimeout(() => getFinalResult(), 1200);
        return;
    }
    state.step = 'followup';
    const sym = state.followUpSymptoms[state.followUpIndex];
    const readable = sym.replace(/_/g, ' ');
    botSay(`Do you also have ${readable}?`, 600, ['Yes', 'No']);
}

async function getFinalResult() {
    try {
        showTyping();
        const allSymptoms = [...state.symptoms, ...state.extraSymptoms];
        const res = await fetch('/predict', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                name: state.name,
                age: state.age,
                gender: state.gender,
                symptom_list: allSymptoms
            })
        });
        const data = await res.json();
        removeTyping();

        if (data.error) { addMsg('❌ ' + data.error); return; }

        const precHTML = data.precautions.map((p,i) => `<li>${p}</li>`).join('');
        const html = `
            <div class="result-card">
                <h3>🩺 ${data.disease}</h3>
                <div class="conf">Confidence: ${data.confidence}%</div>
                <div class="result-row"><span>👨‍⚕️</span><span>Recommended: <strong>${data.doctor}</strong></span></div>
                <div class="result-row"><span>📖</span><span>${data.description}</span></div>
                <div class="prec-list">
                    <h4>🛡️ Precautions:</h4>
                    <ol>${precHTML}</ol>
                </div>
                <div class="result-row" style="margin-top:12px"><span>📱</span><span>eSanjeevani · Apollo 24x7 · 🚑 108</span></div>
            </div>`;

        const messages = document.getElementById('messages');
        const msg = document.createElement('div');
        msg.className = 'msg bot';
        msg.innerHTML = `<div class="msg-avatar">🤖</div><div class="msg-bubble" style="padding:0;background:transparent;max-width:90%">${html}</div>`;
        messages.appendChild(msg);
        messages.scrollTop = messages.scrollHeight;

        setTimeout(() => {
            botSay(`Thank you ${state.name}! Wishing you good health! 💚 Remember, this is not a substitute for professional medical advice.`);
            state.step = 'done';
        }, 800);

    } catch(e) {
        removeTyping();
        addMsg('❌ Something went wrong. Please try again.');
    }
}

// Start conversation
window.onload = () => {
    setTimeout(() => botSay("👋 Welcome to HealthCare ChatBot! I'll ask you a few questions to understand your condition."), 500);
    setTimeout(() => botSay("What is your name?"), 1400);
};
</script>
</body>
</html>
